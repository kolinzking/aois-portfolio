apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: aois-api
  namespace: aois
spec:
  scaleTargetRef:
    name: aois-api
  minReplicaCount: 1
  maxReplicaCount: 1
  pollingInterval: 30
  cooldownPeriod: 300
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
