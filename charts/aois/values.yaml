namespace: aois

app:
  name: aois-api
  image: ghcr.io/kolinzking/aois:96d53a7baa294ed2bcbdc3bce0f81601c3365ed2
  replicas: 1
  providerCallsEnabled: "false"

service:
  type: ClusterIP
  port: 8006

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

quota:
  requestsCpu: 250m
  requestsMemory: 256Mi
  limitsCpu: 500m
  limitsMemory: 512Mi
  pods: "2"

security:
  automountServiceAccountToken: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
