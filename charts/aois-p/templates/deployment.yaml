apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.app.name }}
        app.kubernetes.io/part-of: aois-portfolio
    spec:
      serviceAccountName: {{ .Values.app.name }}
      automountServiceAccountToken: {{ .Values.security.automountServiceAccountToken }}
      containers:
        - name: api
          image: {{ .Values.app.image }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: AOIS_APP_NAME
              value: aois-p
            - name: AOIS_ENV
              value: kubernetes
            - name: AOIS_PROVIDER_CALLS_ENABLED
              value: {{ .Values.app.providerCallsEnabled | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem }}
            runAsNonRoot: {{ .Values.security.runAsNonRoot }}
