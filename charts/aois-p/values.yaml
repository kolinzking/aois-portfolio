namespace: aois-p

app:
  name: aois-p-api
  image: aois-p/api:local
  replicas: 1
  providerCallsEnabled: "false"

service:
  type: ClusterIP
  port: 8006

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

quota:
  requestsCpu: 250m
  requestsMemory: 256Mi
  limitsCpu: 500m
  limitsMemory: 512Mi
  pods: "2"

security:
  automountServiceAccountToken: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
